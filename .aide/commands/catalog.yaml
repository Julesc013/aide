  - id: aide-compile
    display_name: aide compile
    invocation: py -3 scripts/aide compile
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: with-reviewed-flags
    notes: Q05 adds deterministic dry-run, preview, and explicit write behavior for managed generated artifacts; Q07 reports Dominium Bridge target classes as plan-only metadata.
  - id: aide-validate
    display_name: aide validate
    invocation: py -3 scripts/aide validate
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Performs structural Profile/Contract, queue, Harness, generated-artifact, Q06 compatibility baseline, and Q07 Dominium Bridge checks without full YAML schema validation.
  - id: aide-doctor
    display_name: aide doctor
    invocation: py -3 scripts/aide doctor
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Prints actionable diagnostics and next-step guidance, including Q07 Dominium Bridge boundary posture.
  - id: aide-migrate
    display_name: aide migrate
    invocation: py -3 scripts/aide migrate
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Q06 reports current compatibility versions and the baseline-current-noop migration registry; it still does not mutate files.
  - id: aide-bakeoff
    display_name: aide bakeoff
    invocation: py -3 scripts/aide bakeoff
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Metadata/readiness report only; it does not call providers, models, native hosts, browser tools, or network services.
  - id: aide-self-check
    display_name: aide self-check
    invocation: py -3 scripts/aide self-check
    command_kind: harness-command
    status: implemented-v0-passed-with-notes
    owner_component: core-harness
    mutates_repo: with-reviewed-flags
    notes: Q08/QFIX-01 report-first self-hosting check; default mode is non-mutating, --write-report is limited to non-canonical evidence under .aide/runs/self-check/, and next-step guidance now points beyond stale Q09 review.
  - id: aide-lite
    display_name: AIDE Lite
    invocation: py -3 .aide/scripts/aide_lite.py <command>
    command_kind: repo-local-helper
    status: implemented-passed-with-notes
    owner_component: token-survival-foundation
    mutates_repo: command-dependent
    notes: Q09-Q20 no-install token/context/verifier/review/ledger/eval/outcome/router/cache/gateway/provider helper for doctor, validate, estimate, snapshot, index, context, map, pack, verify, review-pack, ledger scan/add/report/compare, eval list/run/report, outcome add/report, optimize suggest, route list/validate/explain, cache init/status/key/report, gateway status/endpoints/smoke/serve, provider list/status/validate/contract/probe, adapt, selftest, and test. QFIX-02 makes `py -3 .aide/scripts/aide_lite.py test` the canonical AIDE Lite validation command; `py -3 -m unittest discover -s .aide/scripts/tests` remains the supported raw unittest form. The invalid `-t .` discovery form is non-canonical for the hidden `.aide` path. AIDE Lite remains standard-library only and does not call models, providers, or outbound network services.
  - id: aide-lite-test
    display_name: AIDE Lite canonical test runner
    invocation: py -3 .aide/scripts/aide_lite.py test
    command_kind: repo-local-helper
    status: implemented
    owner_component: aide-lite
    mutates_repo: false
    notes: QFIX-02 canonical AIDE Lite validation command. It aliases the internal selftest checks, returns nonzero on failure, uses only Python standard library behavior, and makes no provider/model/network calls. The supported raw unittest command is `py -3 -m unittest discover -s .aide/scripts/tests`; the old `-t .` variant is intentionally non-canonical because `.aide` is not a package path under repo-root top-level discovery.
  - id: aide-lite-export-pack
    display_name: AIDE Lite export pack
    invocation: py -3 .aide/scripts/aide_lite.py export-pack --name aide-lite-pack-v0
    command_kind: repo-local-helper
    status: implemented
    owner_component: cross-repo-pack
    mutates_repo: true
    notes: Q21 deterministic no-call exporter for `.aide/export/aide-lite-pack-v0`. It copies only portable AIDE Lite scripts, policies, prompts, templates, starter evals, docs, no-call metadata, and install instructions; it excludes source profile identity, queue history, generated context, reports, route/cache/controller/latest state, Gateway/provider status reports, local state, secrets, raw prompts, and raw responses.
  - id: aide-lite-import-pack
    display_name: AIDE Lite import pack
    invocation: py -3 .aide/scripts/aide_lite.py import-pack --pack .aide/export/aide-lite-pack-v0 --target <target> [--dry-run]
    command_kind: repo-local-helper
    status: implemented-local-fixture
    owner_component: cross-repo-pack
    mutates_repo: command-dependent
    notes: Q21 importer for local target repositories and fixtures. Dry-run reports intended operations without writes; import copies portable files, creates target-specific profile/memory placeholders from templates, preserves AGENTS manual content, ensures `.aide.local/` is ignored, and does not call providers, models, or network services. Real Eureka/Dominium imports remain Q22/Q23.
  - id: aide-lite-pack-status
    display_name: AIDE Lite pack status
    invocation: py -3 .aide/scripts/aide_lite.py pack-status
    command_kind: repo-local-helper
    status: implemented
    owner_component: cross-repo-pack
    mutates_repo: false
    notes: Q21 pack checksum and boundary status command for the committed AIDE Lite Pack.
  - id: aide-lite-gateway
    display_name: AIDE Lite gateway
    invocation: py -3 .aide/scripts/aide_lite.py gateway <status|endpoints|smoke|serve>
    command_kind: repo-local-helper
    status: implemented-report-only
    owner_component: gateway-skeleton
    mutates_repo: command-dependent
    notes: Q19 local/report-only Gateway status and localhost skeleton commands. They expose health/status/route/summaries/version metadata only and do not implement provider forwarding, OpenAI/Anthropic-compatible proxy behavior, provider calls, model calls, or outbound network calls.
  - id: aide-lite-provider
    display_name: AIDE Lite provider
    invocation: py -3 .aide/scripts/aide_lite.py provider <list|status|validate|contract|probe --offline>
    command_kind: repo-local-helper
    status: implemented-metadata-only
    owner_component: provider-adapters
    mutates_repo: command-dependent
    notes: Q20 offline provider-adapter metadata commands accepted with notes by QFIX-01. `provider status` refreshes deterministic provider status artifacts; other commands report or validate metadata only. Live provider calls, model calls, network probes, credentials, and Gateway forwarding remain forbidden.
