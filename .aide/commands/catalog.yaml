    display_name: Queue status
    invocation: py -3 scripts/aide-queue-status
    command_kind: queue-helper-script
    status: implemented
    owner_component: queue
    mutates_repo: false
    notes: Conservative read-only queue status summary.
  - id: queue-next
    display_name: Queue next
    invocation: py -3 scripts/aide-queue-next
    command_kind: queue-helper-script
    status: implemented
    owner_component: queue
