schema_version: aide.commands-catalog.v0
profile_contract_version: aide.profile-contract.v0
catalog_status: partial-post-token-foundation
source_of_truth_note: This catalog declares command posture only. Q04 implements Harness v0; Q09-Q48 add AIDE Lite helper families that remain repo-local and no-call unless an explicit reviewed command writes committed artifacts.
compatibility_note: Q06 extends validate and migrate with structural compatibility baseline checks; Q08 adds report-first self-check; QFIX-01 reconciles Q09-Q20 as accepted with notes; QFIX-02 establishes the canonical AIDE Lite validation command; Q27 adds commit/task recovery; Q28 adds report-only Git workflow detection; Q29 adds dry-run-first Git helper plans with fixture-only mutation tests; Q30 adds AIDE-specific dev/main policy reporting without live branch mutation; Q31 makes Q27-Q30 governance portable in the export pack without exporting AIDE-specific generated branch state; Q34 adds preview-only changelog and release-note draft generation; Q35 adds report-only GitHub protection and CI advisory plans without GitHub API, workflow, branch, tag, or release mutation; Q36 adds deterministic intent compilation and prompt normalization without executing the compiled task; Q37 adds deterministic repo intelligence indexing without file moves, deletes, refactors, provider/model/network calls, or target-repo mutation; Q38 adds deterministic advisory file-quality ledger reports without file moves, deletes, refactors, automatic fixes, provider/model/network calls, or target-repo mutation; Q39 adds dry-run refactor planning without applying moves, deletes, rewrites, migrations, or deletion approval; Q40 adds no-apply root recycling inventory/classification/planning without root moves, file deletes, reference rewrites, tool absorption, provider/model/network calls, or target-repo mutation; Q41 adds no-execution existing-tool inventory/classification/wrap-planning without unknown tool execution, tool deletion, rename, migration, active wrapping, provider/model/network calls, or target-repo mutation; Q42 adds candidate map/alias/rewrite planning without applying moves, deletes, aliases, shims, or rewrites; Q43 adds install observe/plan/dry-run support without install apply, overwrite, migration apply, provider/model/network calls, branch mutation, or target-repo mutation; Q44 adds repair observe/diagnose/plan/dry-run support without repair apply, overwrite, delete, migration apply, provider/model/network calls, branch mutation, or target-repo mutation; Q45 adds upgrade observe-current/observe-source/compare/plan/dry-run support without upgrade apply, overwrite, delete, migration apply, install/repair apply, provider/model/network calls, branch mutation, or target-repo mutation; Q46 adds rollback/uninstall observe/plan/dry-run support without rollback apply, uninstall apply, deletion, overwrite, managed-section removal, provider/model/network calls, branch mutation, or target-repo mutation; Q47 adds local release-bundle generation without publishing, tags, uploads, network calls, or target installs; Q48 adds local GitHub Release draft generation without tags, GitHub API calls, uploads, branch mutation, publication, or release creation.
commands:
  - id: queue-status
    display_name: Queue status
    invocation: py -3 scripts/aide-queue-status
    command_kind: queue-helper-script
    status: implemented
    owner_component: queue
    mutates_repo: false
    notes: Conservative read-only queue status summary.
  - id: queue-next
    display_name: Queue next
    invocation: py -3 scripts/aide-queue-next
    command_kind: queue-helper-script
    status: implemented
    owner_component: queue
    mutates_repo: false
    notes: Conservative read-only next pending item reader.
  - id: queue-run-skeleton
    display_name: Queue run skeleton
    invocation: py -3 scripts/aide-queue-run
    command_kind: queue-helper-script
    status: implemented-skeleton
    owner_component: queue
    mutates_repo: false
    notes: Prints next task and prompt. It does not invoke Codex or any worker.
  - id: aide-init
    display_name: aide init
    invocation: py -3 scripts/aide init
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
