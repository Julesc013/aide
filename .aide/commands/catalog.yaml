schema_version: aide.commands-catalog.v0
profile_contract_version: aide.profile-contract.v0
catalog_status: partial-post-token-foundation
source_of_truth_note: This catalog declares command posture only. Q04 implements Harness v0; Q09-Q20 add AIDE Lite helper families that remain repo-local and no-call.
compatibility_note: Q06 extends validate and migrate with structural compatibility baseline checks; Q08 adds report-first self-check; QFIX-01 reconciles Q09-Q20 as accepted with notes; QFIX-02 establishes the canonical AIDE Lite validation command.
commands:
