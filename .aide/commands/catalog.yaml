schema_version: aide.commands-catalog.v0
profile_contract_version: aide.profile-contract.v0
catalog_status: partial-post-token-foundation
source_of_truth_note: This catalog declares command posture only. Q04 implements Harness v0; Q09-Q37 add AIDE Lite helper families that remain repo-local and no-call unless an explicit reviewed command writes committed artifacts.
compatibility_note: Q06 extends validate and migrate with structural compatibility baseline checks; Q08 adds report-first self-check; QFIX-01 reconciles Q09-Q20 as accepted with notes; QFIX-02 establishes the canonical AIDE Lite validation command; Q27 adds commit/task recovery; Q28 adds report-only Git workflow detection; Q29 adds dry-run-first Git helper plans with fixture-only mutation tests; Q30 adds AIDE-specific dev/main policy reporting without live branch mutation; Q31 makes Q27-Q30 governance portable in the export pack without exporting AIDE-specific generated branch state; Q34 adds preview-only changelog and release-note draft generation; Q35 adds report-only GitHub protection and CI advisory plans without GitHub API, workflow, branch, tag, or release mutation; Q36 adds deterministic intent compilation and prompt normalization without executing the compiled task; Q37 adds deterministic repo intelligence indexing without file moves, deletes, refactors, provider/model/network calls, or target-repo mutation.
commands:
  - id: queue-status
    display_name: Queue status
    invocation: py -3 scripts/aide-queue-status
    command_kind: queue-helper-script
    status: implemented
    owner_component: queue
    mutates_repo: false
    notes: Conservative read-only queue status summary.
  - id: queue-next
    display_name: Queue next
    invocation: py -3 scripts/aide-queue-next
    command_kind: queue-helper-script
    status: implemented
    owner_component: queue
    mutates_repo: false
    notes: Conservative read-only next pending item reader.
  - id: queue-run-skeleton
    display_name: Queue run skeleton
    invocation: py -3 scripts/aide-queue-run
    command_kind: queue-helper-script
    status: implemented-skeleton
    owner_component: queue
    mutates_repo: false
    notes: Prints next task and prompt. It does not invoke Codex or any worker.
  - id: aide-init
    display_name: aide init
    invocation: py -3 scripts/aide init
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Reports initialization posture and refuses to overwrite an existing `.aide/` contract.
  - id: aide-import
    display_name: aide import
    invocation: py -3 scripts/aide import
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Report-only inspection of guidance surfaces; it does not rewrite contract files.
  - id: aide-compile
    display_name: aide compile
    invocation: py -3 scripts/aide compile
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: with-reviewed-flags
    notes: Q05 adds deterministic dry-run, preview, and explicit write behavior for managed generated artifacts; Q07 reports Dominium Bridge target classes as plan-only metadata.
  - id: aide-validate
    display_name: aide validate
    invocation: py -3 scripts/aide validate
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Performs structural Profile/Contract, queue, Harness, generated-artifact, Q06 compatibility baseline, and Q07 Dominium Bridge checks without full YAML schema validation.
  - id: aide-doctor
    display_name: aide doctor
    invocation: py -3 scripts/aide doctor
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Prints actionable diagnostics and next-step guidance, including Q07 Dominium Bridge boundary posture.
  - id: aide-migrate
    display_name: aide migrate
    invocation: py -3 scripts/aide migrate
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Q06 reports current compatibility versions and the baseline-current-noop migration registry; it still does not mutate files.
  - id: aide-bakeoff
    display_name: aide bakeoff
    invocation: py -3 scripts/aide bakeoff
    command_kind: harness-command
    status: implemented-v0
    owner_component: core-harness
    mutates_repo: false
    notes: Metadata/readiness report only; it does not call providers, models, native hosts, browser tools, or network services.
  - id: aide-self-check
    display_name: aide self-check
    invocation: py -3 scripts/aide self-check
    command_kind: harness-command
    status: implemented-v0-passed-with-notes
    owner_component: core-harness
    mutates_repo: with-reviewed-flags
    notes: Q08/QFIX/QCHECK report-first self-hosting check; default mode is non-mutating, --write-report is limited to non-canonical evidence under .aide/runs/self-check/, and Q35 refreshes next-step guidance so it points to Q36 after GitHub/CI advisory support is present.
  - id: aide-lite
    display_name: AIDE Lite
    invocation: py -3 .aide/scripts/aide_lite.py <command>
    command_kind: repo-local-helper
    status: implemented-passed-with-notes
    owner_component: token-survival-foundation
    mutates_repo: command-dependent
    notes: Q09-Q37 no-install token/context/verifier/review/ledger/eval/outcome/router/cache/gateway/provider/export/import/adapter/commit/changelog/github/task/git/intent/repo helper for doctor, validate, estimate, snapshot, index, context, map, pack, verify, review-pack, ledger scan/add/report/compare, eval list/run/report, outcome add/report, optimize suggest, route list/validate/explain, cache init/status/key/report, gateway status/endpoints/smoke/serve, provider list/status/validate/contract/probe, export-pack, import-pack, pack-status, adapter list/render/preview/validate/drift/generate, commit check/template/status/install-hook, changelog preview/validate/status, github advisory/status/protection/ci/validate, task inspect/status/noop-check/dependencies/recover/evidence/current, git detect/doctor/status/workflow/roles/policy/plan/sync/land/promote/prune, intent compile/validate/examples/status, repo inventory/classify/validate/status/explain-file/docs/tests/deps, adapt, selftest, and test. QFIX-02 makes `py -3 .aide/scripts/aide_lite.py test` the canonical AIDE Lite validation command; Q25 makes pack-status pass with a stable checksum scope and makes import-pack safe-scoped by default. Q27 adds structured commit and report-first WorkUnit recovery commands. Q28 adds report-only branch workflow detection. Q29 adds dry-run-first branch helper plans and fixture-only local mutation tests. Q30 adds AIDE-specific dev/main plan reporting while forbidding live branch mutation. Q31 validates portable governance export/import and fixture command availability. Q34 generates preview-only changelog/release-note drafts and malformed-commit reports. Q35 generates report-only GitHub protection and CI advisory plans. Q36 compiles raw prompts into deterministic intent packets and draft WorkUnits without executing them. Q37 writes deterministic repo intelligence indexes without moving, deleting, refactoring, or declaring files dead. AIDE Lite remains standard-library only and does not call models, providers, outbound network services, GitHub APIs, release publishing, tag creation, workflow installation, or live branch mutation commands by default.
  - id: aide-lite-intent
    display_name: AIDE Lite intent compiler
    invocation: py -3 .aide/scripts/aide_lite.py intent <compile|validate|examples|status>
    command_kind: repo-local-helper
    status: implemented-compile-only
    owner_component: intent-compiler
    mutates_repo: command-dependent
    notes: Q36 deterministic prompt normalizer. `intent compile` writes `.aide/intake/latest-intent-packet.*` and `.aide/intake/latest-workunit-draft.*`; `validate`, `examples`, and `status` are report-only. It reads repo-local policy, queue/latest-task state, and branch-state refs, stores only a prompt hash plus bounded excerpt, and never calls providers, models, network services, GitHub APIs, target repos, branch mutation commands, or the compiled WorkUnit.
  - id: aide-lite-repo
    display_name: AIDE Lite repo intelligence
    invocation: py -3 .aide/scripts/aide_lite.py repo <inventory|classify|validate|status|explain-file|docs|tests|deps>
    command_kind: repo-local-helper
    status: implemented-index-only
    owner_component: repo-intelligence
    mutates_repo: command-dependent
    notes: Q37 deterministic repo intelligence indexer. `repo inventory` and `repo classify` write `.aide/repo/file-inventory.json`, ownership/dependency/test/doc-link/generated/orphan maps, and `latest-repo-intelligence.md`; status, explain-file, docs, tests, deps, and validate summarize or validate those outputs. Commands do not move, delete, refactor, migrate, call providers/models/network, mutate target repos, or treat orphan candidates as deletion advice.
  - id: aide-lite-commit
    display_name: AIDE Lite commit discipline
    invocation: py -3 .aide/scripts/aide_lite.py commit <check|template|status|install-hook>
    command_kind: repo-local-helper
    status: implemented
    owner_component: commit-discipline
    mutates_repo: command-dependent
    notes: Q27 structured commit checker and optional hook installer. `check` and `status` are report-only; `template --output` writes only the requested repo-local template path; `install-hook` only changes `core.hooksPath` when explicitly invoked and never writes `.git/hooks`.
  - id: aide-lite-changelog-preview
    display_name: AIDE Lite changelog and release-note previews
    invocation: py -3 .aide/scripts/aide_lite.py changelog <preview|validate|status> [--range BASE..HEAD]
    command_kind: repo-local-helper
    status: implemented
    owner_component: commit-discipline
    mutates_repo: true
    notes: Q34 deterministic changelog/release-note preview generator from structured commit bodies. `preview` writes `.aide/changelog/CHANGELOG.preview.md`, `RELEASE_NOTES.preview.md`, matching JSON files, `malformed-commits.md`, and `latest-changelog-report.md`; `validate` and `status` are report-only. It reports malformed commits and does not tag, publish, create GitHub Releases, mutate branches, or call providers/models/network.
  - id: aide-lite-github-advisory
    display_name: AIDE Lite GitHub advisory
    invocation: py -3 .aide/scripts/aide_lite.py github <advisory|status|protection|ci|validate>
    command_kind: repo-local-helper
    status: implemented-report-only
    owner_component: github-protection-ci-advisory
    mutates_repo: command-dependent
    notes: Q35 report-only GitHub protection and CI advisory command family. `advisory`, `protection`, and `ci` write generated reports under `.aide/github/`; `status` and `validate` are report-only. Commands do not call GitHub APIs, write `.github/workflows`, install CI, mutate branches, push, tag, publish releases, call providers/models, or use outbound network services.
  - id: aide-lite-task-recovery
    display_name: AIDE Lite task recovery
    invocation: py -3 .aide/scripts/aide_lite.py task <inspect|status|noop-check|dependencies|recover|evidence|current>
    command_kind: repo-local-helper
    status: implemented-report-only
    owner_component: workunit-recovery
    mutates_repo: command-dependent
    notes: Q27 repo-state-first task inspection and recovery guidance. Default behavior is report-only; `recover --write-report` writes a bounded recovery report under the selected task evidence directory.
  - id: aide-lite-git-workflow
    display_name: AIDE Lite Git workflow
    invocation: py -3 .aide/scripts/aide_lite.py git <detect|doctor|status|workflow|roles|policy|plan|sync|land|promote|prune>
    command_kind: repo-local-helper
    status: implemented-report-only
    owner_component: git-workflow-policy
    mutates_repo: command-dependent
    notes: Q28 local Git workflow detector and policy validator plus Q29 dry-run-first helper plans and Q30 AIDE dev/main policy reporting. `git detect` writes `.aide/git/workflow-detection.json` and `.md`; `git plan` writes `.aide/git/latest-helper-plan.json` and `.md`; when `.aide/git/aide-branch-policy.yaml` is present, detect/plan also refresh `.aide/git/aide-dev-main-plan.json` and `.md`. `git sync`, `git land`, `git promote`, and `git prune` default to dry-run/report-only. Q30 does not run --apply on live AIDE branches, does not create `dev`, and does not push remotes.
  - id: aide-lite-test
    display_name: AIDE Lite canonical test runner
    invocation: py -3 .aide/scripts/aide_lite.py test
    command_kind: repo-local-helper
    status: implemented
    owner_component: aide-lite
    mutates_repo: false
    notes: QFIX-02 canonical AIDE Lite validation command. It aliases the internal selftest checks, returns nonzero on failure, uses only Python standard library behavior, and makes no provider/model/network calls. The supported raw unittest command is `py -3 -m unittest discover -s .aide/scripts/tests`; the old `-t .` variant is intentionally non-canonical because `.aide` is not a package path under repo-root top-level discovery.
  - id: aide-lite-export-pack
    display_name: AIDE Lite export pack
    invocation: py -3 .aide/scripts/aide_lite.py export-pack --name aide-lite-pack-v0
    command_kind: repo-local-helper
    status: implemented
    owner_component: cross-repo-pack
    mutates_repo: true
    notes: Q21/Q25/Q31 deterministic no-call exporter for `.aide/export/aide-lite-pack-v0`. It copies portable AIDE Lite scripts, policies, prompts, templates, starter evals, docs, no-call metadata, commit/task/Git governance, dry-run helper policy, and install instructions; it excludes source profile identity, queue history, generated context, reports, route/cache/controller/latest state, Gateway/provider status reports, AIDE-specific generated Git reports/plans, local state, secrets, raw prompts, and raw responses. Checksums cover payload and static pack docs while excluding mutable metadata files `manifest.yaml`, `checksums.json`, and `export-report.md`.
  - id: aide-lite-import-pack
    display_name: AIDE Lite import pack
    invocation: py -3 .aide/scripts/aide_lite.py import-pack --pack .aide/export/aide-lite-pack-v0 --target <target> [--dry-run] [--mode safe|full]
    command_kind: repo-local-helper
    status: implemented-local-fixture
    owner_component: cross-repo-pack
    mutates_repo: command-dependent
    notes: Q21/Q25/Q31 importer for local target repositories and fixtures. Dry-run reports exact planned writes, conflicts, and skipped paths without writes. Safe mode is the default and skips optional broad `core/` roots and non-reference `docs/` roots while allowing portable `docs/reference/**` governance docs; full mode requires explicit selection for reviewed local fixtures. Import preserves AGENTS manual content, creates target-specific profile/memory placeholders from templates, imports hook templates without installing `.git/hooks`, ensures `.aide.local/` is ignored, and does not call providers, models, network services, or branch mutation commands.
  - id: aide-lite-pack-status
    display_name: AIDE Lite pack status
    invocation: py -3 .aide/scripts/aide_lite.py pack-status
    command_kind: repo-local-helper
    status: implemented
    owner_component: cross-repo-pack
    mutates_repo: false
    notes: Q21/Q25 pack checksum and boundary status command for the committed AIDE Lite Pack. It validates payload checksums, boundary exclusions, and reports checksum problems without treating mutable manifest/checksum/report metadata as payload.
  - id: aide-lite-adapter
    display_name: AIDE Lite adapter compiler
    invocation: py -3 .aide/scripts/aide_lite.py adapter <list|render|preview|validate|drift|generate>
    command_kind: repo-local-helper
    status: implemented-preview-and-managed
    owner_component: existing-tool-adapters
    mutates_repo: command-dependent
    notes: Q24 deterministic adapter compiler for existing-tool guidance. It renders generated previews under `.aide/generated/adapters/`, validates compact-packet/evidence/no-secret guidance, reports drift, and writes only safe managed-section targets such as `AGENTS.md`; Claude Code, Aider, Cline, Continue, Cursor, and Windsurf outputs remain preview-only. It does not call tools, providers, models, Gateway forwarding, or network services.
  - id: aide-lite-gateway
    display_name: AIDE Lite gateway
    invocation: py -3 .aide/scripts/aide_lite.py gateway <status|endpoints|smoke|serve>
    command_kind: repo-local-helper
    status: implemented-report-only
    owner_component: gateway-skeleton
    mutates_repo: command-dependent
    notes: Q19 local/report-only Gateway status and localhost skeleton commands. They expose health/status/route/summaries/version metadata only and do not implement provider forwarding, OpenAI/Anthropic-compatible proxy behavior, provider calls, model calls, or outbound network calls.
  - id: aide-lite-provider
    display_name: AIDE Lite provider
    invocation: py -3 .aide/scripts/aide_lite.py provider <list|status|validate|contract|probe --offline>
    command_kind: repo-local-helper
    status: implemented-metadata-only
    owner_component: provider-adapters
    mutates_repo: command-dependent
    notes: Q20 offline provider-adapter metadata commands accepted with notes by QFIX-01. `provider status` refreshes deterministic provider status artifacts; other commands report or validate metadata only. Live provider calls, model calls, network probes, credentials, and Gateway forwarding remain forbidden.
