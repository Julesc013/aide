    status: implemented-v0-passed-with-notes
    owner_component: core-harness
    mutates_repo: with-reviewed-flags
    notes: Q08/QFIX/QCHECK report-first self-hosting check; default mode is non-mutating, --write-report is limited to non-canonical evidence under .aide/runs/self-check/, and Q35 refreshes next-step guidance so it points to Q36 after GitHub/CI advisory support is present.
  - id: aide-lite
    display_name: AIDE Lite
    invocation: py -3 .aide/scripts/aide_lite.py <command>
    command_kind: repo-local-helper
    status: implemented-passed-with-notes
    owner_component: token-survival-foundation
    mutates_repo: command-dependent
    notes: Q09-Q48 no-install token/context/verifier/review/ledger/eval/outcome/router/cache/gateway/provider/export/import/adapter/commit/changelog/github/task/git/intent/repo/quality/refactor/roots/tools/install/repair/upgrade/rollback/uninstall/release helper for doctor, validate, estimate, snapshot, index, context, map, pack, verify, review-pack, ledger scan/add/report/compare, eval list/run/report, outcome add/report, optimize suggest, route list/validate/explain, cache init/status/key/report, gateway status/endpoints/smoke/serve, provider list/status/validate/contract/probe, export-pack, import-pack, pack-status, adapter list/render/preview/validate/drift/generate, commit check/template/status/install-hook, changelog preview/validate/status, github advisory/status/protection/ci/validate, task inspect/status/noop-check/dependencies/recover/evidence/current, git detect/doctor/status/workflow/roles/policy/plan/sync/land/promote/prune, intent compile/validate/examples/status, repo inventory/classify/validate/status/explain-file/docs/tests/deps, quality ledger/validate/status/explain-file/docs/tests/modules/reuse, refactor status/plan/validate/dry-run/schemas/ledger/map/move-map/salvage-map/aliases/rewrite-plan/validate-map/map-status, roots inventory/classify/plan/validate/status/explain-root/explain-file, tools inventory/classify/wrap-plan/validate/status/explain-tool/capabilities, install observe/plan/dry-run/validate/status/explain/ownership/conflicts, repair observe/diagnose/plan/dry-run/validate/status/explain/classes/doctor, upgrade observe-current/observe-source/compare/plan/dry-run/validate/status/explain/compatibility/conflicts/migrations, rollback observe/plan/dry-run/validate/status/explain/classes, uninstall observe/plan/dry-run/validate/status/explain/classes, release bundle/validate/status/assets/manifest/checksums/provenance/clean dry-run/draft/draft-validate/draft-status/upload-plan/checklist/publication-boundary, adapt, selftest, and test. QFIX-02 makes `py -3 .aide/scripts/aide_lite.py test` the canonical AIDE Lite validation command; Q25 makes pack-status pass with a stable checksum scope and makes import-pack safe-scoped by default. Q27 adds structured commit and report-first WorkUnit recovery commands. Q28 adds report-only branch workflow detection. Q29 adds dry-run-first branch helper plans and fixture-only local mutation tests. Q30 adds AIDE-specific dev/main plan reporting while forbidding live branch mutation. Q31 validates portable governance export/import and fixture command availability. Q34 generates preview-only changelog/release-note drafts and malformed-commit reports. Q35 generates report-only GitHub protection and CI advisory plans. Q36 compiles raw prompts into deterministic intent packets and draft WorkUnits without executing them. Q37 writes deterministic repo intelligence indexes without moving, deleting, refactoring, or declaring files dead. Q38 writes advisory quality reports without moving, deleting, refactoring, auto-fixing, or declaring files dead. Q39 writes dry-run refactor readiness and example plans without applying moves, deletes, rewrites, migrations, or deletion approval. Q40 writes root inventory, classification, risk, exception, and no-apply root plans without moving roots, deleting files, rewriting references, absorbing tools, or deletion approval. Q41 writes no-execution tool inventories and wrap plans. Q42 writes candidate move/salvage/alias/rewrite maps without moving, deleting, rewriting, aliasing, shimming, or applying migrations. Q43 writes install observation, no-apply plans, dry-run reports, ownership ledgers, conflict reports, preservation reports, and verification plans without installing, overwriting, or migrating files. Q44 writes repair observation, diagnosis, no-apply plans, dry-run reports, doctor repair reports, and verification plans without repairing, overwriting, deleting, or migrating files. Q45 writes current-install and source-pack observations, compatibility comparisons, no-apply upgrade plans, dry-run reports, conflict reports, migration reports, and verification plans without upgrading, overwriting, deleting, or migrating files. Q46 writes rollback and uninstall observations, no-apply plans, dry-run reports, and verification plans without rolling back, uninstalling, deleting, overwriting, removing managed sections, or treating unknown ownership as removable. Q47 writes local release bundle archives, checksums, manifests, install notes, provenance, and extraction validation without publishing. Q48 writes local GitHub Release draft text, asset lists, no-upload plans, checklists, publication-boundary reports, and draft validation without tagging, uploading, calling GitHub APIs, or publishing. AIDE Lite remains standard-library only and does not call models, providers, outbound network services, GitHub APIs, release publishing, tag creation, workflow installation, or live branch mutation commands by default.
  - id: aide-lite-intent
    display_name: AIDE Lite intent compiler
    invocation: py -3 .aide/scripts/aide_lite.py intent <compile|validate|examples|status>
    command_kind: repo-local-helper
    status: implemented-compile-only
    owner_component: intent-compiler
    mutates_repo: command-dependent
    notes: Q36 deterministic prompt normalizer. `intent compile` writes `.aide/intake/latest-intent-packet.*` and `.aide/intake/latest-workunit-draft.*`; `validate`, `examples`, and `status` are report-only. It reads repo-local policy, queue/latest-task state, and branch-state refs, stores only a prompt hash plus bounded excerpt, and never calls providers, models, network services, GitHub APIs, target repos, branch mutation commands, or the compiled WorkUnit.
  - id: aide-lite-repo
    display_name: AIDE Lite repo intelligence
    invocation: py -3 .aide/scripts/aide_lite.py repo <inventory|classify|validate|status|explain-file|docs|tests|deps>
    command_kind: repo-local-helper
    status: implemented-index-only
    owner_component: repo-intelligence
    mutates_repo: command-dependent
    notes: Q37 deterministic repo intelligence indexer. `repo inventory` and `repo classify` write `.aide/repo/file-inventory.json`, ownership/dependency/test/doc-link/generated/orphan maps, and `latest-repo-intelligence.md`; status, explain-file, docs, tests, deps, and validate summarize or validate those outputs. Commands do not move, delete, refactor, migrate, call providers/models/network, mutate target repos, or treat orphan candidates as deletion advice.
  - id: aide-lite-quality
    display_name: AIDE Lite file quality ledger
    invocation: py -3 .aide/scripts/aide_lite.py quality <ledger|validate|status|explain-file|docs|tests|modules|reuse>
    command_kind: repo-local-helper
    status: implemented-advisory-only
    owner_component: file-quality-ledger
    mutates_repo: command-dependent
    notes: Q38 deterministic quality ledger generator. `quality ledger` consumes Q37 repo intelligence and writes `.aide/reports/file-quality-ledger.json` plus summary, docs, tests, module, and reuse reports; status, explain-file, docs, tests, modules, reuse, and validate summarize or validate those outputs. Commands do not move, delete, refactor, auto-fix, call providers/models/network, mutate target repos, or treat warnings as deletion advice.
  - id: aide-lite-refactor
    display_name: AIDE Lite refactor control plane
    invocation: py -3 .aide/scripts/aide_lite.py refactor <status|plan|validate|dry-run|schemas|ledger|map|move-map|salvage-map|aliases|rewrite-plan|validate-map|map-status>
    command_kind: repo-local-helper
    status: implemented-dry-run-only
    owner_component: refactor-control-plane
    mutates_repo: generated-refactor-artifacts-only
    notes: Q39/Q42 deterministic refactor planning surface. `refactor plan` writes `.aide/refactors/latest-refactor-readiness.*`, `.aide/refactors/latest-refactor-plan.example.*`, and an example migration ledger. `refactor map` writes candidate move-map, salvage-map, path-alias, reference-rewrite, draft migration-ledger, and map-validation outputs. Status, validate, dry-run, schemas, ledger, move-map, salvage-map, aliases, rewrite-plan, validate-map, and map-status summarize or validate those outputs. Commands do not move, delete, rewrite references, create aliases or shims, apply migrations, call providers/models/network, mutate branches, mutate target repos, or treat `drop_candidate` as deletion approval.
  - id: aide-lite-refactor-map
    display_name: AIDE Lite move/salvage/path-alias maps
    invocation: py -3 .aide/scripts/aide_lite.py refactor <map|move-map|salvage-map|aliases|rewrite-plan|validate-map|map-status>
    command_kind: repo-local-helper
    status: implemented-candidate-only
    owner_component: refactor-map-planning
    mutates_repo: generated-refactor-artifacts-only
    notes: Q42 candidate map and alias planning surface. `refactor map` writes `.aide/refactors/current-move-map.*`, `current-salvage-map.*`, `path-aliases.*`, `reference-rewrite-plan.*`, `migration-ledger.draft.jsonl`, and `map-validation-report.*`; `validate-map` rejects apply-enabled entries, deletion approval, active alias/shim state, active rewrites, and target-repo mutation. Commands do not move files, delete files, rewrite references, create aliases or shims, apply maps, execute wrappers, mutate branches, mutate target repos, call providers/models/network, or export generated current maps as target truth.
  - id: aide-lite-roots
    display_name: AIDE Lite root recycling framework
    invocation: py -3 .aide/scripts/aide_lite.py roots <inventory|classify|plan|validate|status|explain-root|explain-file>
    command_kind: repo-local-helper
    status: implemented-dry-run-only
    owner_component: root-recycling-framework
    mutates_repo: generated-root-artifacts-only
    notes: Q40 deterministic root recycling planning surface. `roots inventory`, `roots classify`, and `roots plan` write `.aide/roots/latest-root-*`, `root-exceptions.json`, and `root-risk-summary.md`; status, validate, explain-root, and explain-file summarize or validate those outputs. Commands do not move roots, move files, delete files, rewrite references, apply maps, absorb tools, call providers/models/network, mutate branches, mutate target repos, or treat `drop_candidate` as deletion approval.
  - id: aide-lite-tools
    display_name: AIDE Lite existing tool absorption framework
    invocation: py -3 .aide/scripts/aide_lite.py tools <inventory|classify|wrap-plan|validate|status|explain-tool|capabilities>
    command_kind: repo-local-helper
    status: implemented-no-execution
    owner_component: tool-absorption-framework
    mutates_repo: generated-tool-artifacts-only
    notes: Q41 deterministic existing-tool absorption planning surface. `tools inventory`, `tools classify`, and `tools wrap-plan` write `.aide/tools/latest-tool-*`, `latest-tool-adapter-map.*`, and `tool-risk-summary.md`; status, validate, capabilities, and explain-tool summarize or validate those outputs. Commands do not execute unknown tools, delete tools, rename tools, migrate tools, apply wrappers, call providers/models/network, mutate branches, mutate target repos, or treat `drop_candidate` as deletion approval.
  - id: aide-lite-install
    display_name: AIDE Lite install planning model
    invocation: py -3 .aide/scripts/aide_lite.py install <observe|plan|dry-run|validate|status|explain|ownership|conflicts>
    command_kind: repo-local-helper
    status: implemented-observe-plan-dry-run-only
    owner_component: install-plan-model
    mutates_repo: generated-install-artifacts-only
    notes: Q43 deterministic install planning surface. `install observe`, `install plan`, and `install dry-run` write `.aide/install/latest-*` observation, plan, dry-run, ownership-ledger, conflict, preservation, and verification outputs; status, validate, ownership, conflicts, and explain summarize or validate those outputs. Commands do not install files, overwrite files, migrate files, delete files, move files, rewrite references, call providers/models/network, mutate branches, mutate target repos, or treat source-generated state as target truth.
  - id: aide-lite-repair
    display_name: AIDE Lite repair doctor model
    invocation: py -3 .aide/scripts/aide_lite.py repair <observe|diagnose|plan|dry-run|validate|status|explain|classes|doctor>
    command_kind: repo-local-helper
    status: implemented-observe-plan-dry-run-only
    owner_component: repair-doctor-model
    mutates_repo: generated-repair-artifacts-only
    notes: Q44 deterministic repair/doctor planning surface. `repair observe`, `repair diagnose`, `repair plan`, and `repair dry-run` write `.aide/repair/latest-*` observation, diagnosis, plan, dry-run, doctor, and verification outputs; status, validate, classes, doctor, and explain summarize or validate those outputs. Commands do not repair files, overwrite files, delete files, migrate files, move files, rewrite references, call providers/models/network, mutate branches, mutate target repos, or treat repair findings as apply approval.
  - id: aide-lite-upgrade
    display_name: AIDE Lite upgrade planning model
    invocation: py -3 .aide/scripts/aide_lite.py upgrade <observe-current|observe-source|compare|plan|dry-run|validate|status|explain|compatibility|conflicts|migrations>
    status: active
    source: .aide/scripts/aide_lite.py
    owner_component: upgrade-model
    mutates_repo: generated-upgrade-artifacts-only
    notes: Q45 deterministic upgrade planning surface. `upgrade observe-current`, `upgrade observe-source`, `upgrade compare`, `upgrade plan`, and `upgrade dry-run` write `.aide/upgrade/latest-*` observation, comparison, plan, dry-run, conflict, migration, compatibility, and verification outputs; status, validate, compatibility, conflicts, migrations, and explain summarize or validate those outputs. Commands do not upgrade files, overwrite files, delete files, migrate files, install files, repair files, move files, rewrite references, call providers/models/network, mutate branches, mutate target repos, or treat dry-run findings as apply approval.
  - id: aide-lite-rollback
    display_name: AIDE Lite rollback planning model
    invocation: py -3 .aide/scripts/aide_lite.py rollback <observe|plan|dry-run|validate|status|explain|classes>
    status: active
    source: .aide/scripts/aide_lite.py
    owner_component: rollback-uninstall-model
    mutates_repo: generated-rollback-artifacts-only
    notes: Q46 deterministic rollback planning surface. `rollback observe`, `rollback plan`, and `rollback dry-run` write `.aide/rollback/latest-*` observation, plan, dry-run, and verification outputs; status, validate, classes, and explain summarize or validate those outputs. Commands do not roll back files, overwrite files, delete files, remove managed sections, move files, rewrite references, call providers/models/network, mutate branches, mutate target repos, or treat missing ownership evidence as apply approval.
  - id: aide-lite-uninstall
    display_name: AIDE Lite uninstall planning model
    invocation: py -3 .aide/scripts/aide_lite.py uninstall <observe|plan|dry-run|validate|status|explain|classes>
    status: active
    source: .aide/scripts/aide_lite.py
    owner_component: rollback-uninstall-model
    mutates_repo: generated-uninstall-artifacts-only
    notes: Q46 deterministic uninstall planning surface. `uninstall observe`, `uninstall plan`, and `uninstall dry-run` write `.aide/uninstall/latest-*` observation, plan, dry-run, and verification outputs; status, validate, classes, and explain summarize or validate those outputs. Commands do not uninstall files, delete files, remove managed sections, overwrite files, move files, rewrite references, call providers/models/network, mutate branches, mutate target repos, perform blanket `.aide` deletion, or treat unknown ownership as removable.
  - id: aide-lite-release-draft
    display_name: AIDE Lite GitHub Release draft
    invocation: py -3 .aide/scripts/aide_lite.py release <draft|draft-validate|draft-status|upload-plan|checklist|publication-boundary>
    status: active
    source: .aide/scripts/aide_lite.py
    owner_component: github-release-draft
    mutates_repo: generated-release-draft-artifacts-only
    notes: Q48 deterministic local release-draft surface. `release draft` writes `.aide/release/github-release-*` and `latest-github-release-draft.*` review artifacts from the Q47 local bundle; draft-validate, draft-status, upload-plan, checklist, and publication-boundary validate or summarize those outputs. Commands do not create or push tags, call GitHub APIs, create releases, upload assets, publish packages, mutate branches, install CI, mutate target repos, or apply install/repair/upgrade/rollback/uninstall actions.
  - id: aide-lite-commit
    display_name: AIDE Lite commit discipline
    invocation: py -3 .aide/scripts/aide_lite.py commit <check|template|status|install-hook>
    command_kind: repo-local-helper
    status: implemented
    owner_component: commit-discipline
    mutates_repo: command-dependent
    notes: Q27 structured commit checker and optional hook installer. `check` and `status` are report-only; `template --output` writes only the requested repo-local template path; `install-hook` only changes `core.hooksPath` when explicitly invoked and never writes `.git/hooks`.
  - id: aide-lite-changelog-preview
    display_name: AIDE Lite changelog and release-note previews
    invocation: py -3 .aide/scripts/aide_lite.py changelog <preview|validate|status> [--range BASE..HEAD]
    command_kind: repo-local-helper
    status: implemented
    owner_component: commit-discipline
    mutates_repo: true
    notes: Q34 deterministic changelog/release-note preview generator from structured commit bodies. `preview` writes `.aide/changelog/CHANGELOG.preview.md`, `RELEASE_NOTES.preview.md`, matching JSON files, `malformed-commits.md`, and `latest-changelog-report.md`; `validate` and `status` are report-only. It reports malformed commits and does not tag, publish, create GitHub Releases, mutate branches, or call providers/models/network.
  - id: aide-lite-github-advisory
    display_name: AIDE Lite GitHub advisory
    invocation: py -3 .aide/scripts/aide_lite.py github <advisory|status|protection|ci|validate>
    command_kind: repo-local-helper
    status: implemented-report-only
    owner_component: github-protection-ci-advisory
    mutates_repo: command-dependent
    notes: Q35 report-only GitHub protection and CI advisory command family. `advisory`, `protection`, and `ci` write generated reports under `.aide/github/`; `status` and `validate` are report-only. Commands do not call GitHub APIs, write `.github/workflows`, install CI, mutate branches, push, tag, publish releases, call providers/models, or use outbound network services.
  - id: aide-lite-task-recovery
    display_name: AIDE Lite task recovery
    invocation: py -3 .aide/scripts/aide_lite.py task <inspect|status|noop-check|dependencies|recover|evidence|current>
    command_kind: repo-local-helper
    status: implemented-report-only
    owner_component: workunit-recovery
    mutates_repo: command-dependent
    notes: Q27 repo-state-first task inspection and recovery guidance. Default behavior is report-only; `recover --write-report` writes a bounded recovery report under the selected task evidence directory.
  - id: aide-lite-git-workflow
    display_name: AIDE Lite Git workflow
    invocation: py -3 .aide/scripts/aide_lite.py git <detect|doctor|status|workflow|roles|policy|plan|sync|land|promote|prune>
    command_kind: repo-local-helper
    status: implemented-report-only
    owner_component: git-workflow-policy
    mutates_repo: command-dependent
    notes: Q28 local Git workflow detector and policy validator plus Q29 dry-run-first helper plans and Q30 AIDE dev/main policy reporting. `git detect` writes `.aide/git/workflow-detection.json` and `.md`; `git plan` writes `.aide/git/latest-helper-plan.json` and `.md`; when `.aide/git/aide-branch-policy.yaml` is present, detect/plan also refresh `.aide/git/aide-dev-main-plan.json` and `.md`. `git sync`, `git land`, `git promote`, and `git prune` default to dry-run/report-only. Q30 does not run --apply on live AIDE branches, does not create `dev`, and does not push remotes.
  - id: aide-lite-test
    display_name: AIDE Lite canonical test runner
    invocation: py -3 .aide/scripts/aide_lite.py test
    command_kind: repo-local-helper
    status: implemented
    owner_component: aide-lite
    mutates_repo: false
    notes: QFIX-02 canonical AIDE Lite validation command. It aliases the internal selftest checks, returns nonzero on failure, uses only Python standard library behavior, and makes no provider/model/network calls. The supported raw unittest command is `py -3 -m unittest discover -s .aide/scripts/tests`; the old `-t .` variant is intentionally non-canonical because `.aide` is not a package path under repo-root top-level discovery.
  - id: aide-lite-export-pack
    display_name: AIDE Lite export pack
    invocation: py -3 .aide/scripts/aide_lite.py export-pack --name aide-lite-pack-v0
    command_kind: repo-local-helper
    status: implemented
    owner_component: cross-repo-pack
    mutates_repo: true
    notes: Q21/Q25/Q31 deterministic no-call exporter for `.aide/export/aide-lite-pack-v0`. It copies portable AIDE Lite scripts, policies, prompts, templates, starter evals, docs, no-call metadata, commit/task/Git governance, dry-run helper policy, and install instructions; it excludes source profile identity, queue history, generated context, reports, route/cache/controller/latest state, Gateway/provider status reports, AIDE-specific generated Git reports/plans, local state, secrets, raw prompts, and raw responses. Checksums cover payload and static pack docs while excluding mutable metadata files `manifest.yaml`, `checksums.json`, and `export-report.md`.
  - id: aide-lite-import-pack
    display_name: AIDE Lite import pack
    invocation: py -3 .aide/scripts/aide_lite.py import-pack --pack .aide/export/aide-lite-pack-v0 --target <target> [--dry-run] [--mode safe|full]
