    owner_component: token-survival-gateway
    mutates_repo: command-dependent
    notes: Q09-Q19 no-install token/context/verifier/review/ledger/eval/outcome/router/cache/gateway helper for doctor, validate, estimate, snapshot, index, context, map, pack, verify, review-pack, ledger scan/add/report/compare, eval list/run/report, outcome add/report, optimize suggest, route list/validate/explain, cache init/status/key/report, gateway status/endpoints/smoke/serve, adapt, and selftest; it remains standard-library only and does not call models, providers, or outbound network services.
