schema_version: aide.queue-task.v0
task_id: Q48-github-release-draft-v0
title: GitHub Release Draft v0
status: running
phase: release-preparation
created: 2026-05-15
updated: 2026-05-15
owner: aide
objective: >
  Add deterministic, local-only GitHub Release draft generation from the Q47
  AIDE Lite release bundle, including release draft files, asset lists, upload
  plans, publication checklists, validation, docs, tests, and evidence.
scope:
  allowed_paths:
    - .aide/queue/index.yaml
    - .aide/queue/Q48-github-release-draft-v0/**
    - .aide/scripts/aide_lite.py
    - .aide/scripts/tests/**
    - .aide/policies/github-release-draft.yaml
    - .aide/policies/release-publication-boundary.yaml
    - .aide/policies/release-upload-plan.yaml
    - .aide/policies/release-checklist.yaml
    - .aide/policies/release-bundle.yaml
    - .aide/policies/release-provenance.yaml
    - .aide/release/**
    - .aide/evals/golden-tasks/**
    - .aide/evals/golden-tasks/catalog.yaml
    - .aide/export/aide-lite-pack-v0/**
    - .aide/context/latest-task-packet.md
    - .aide/context/latest-review-packet.md
    - .aide/reports/token-savings-summary.md
    - .aide/prompts/compact-task.md
    - .aide/prompts/evidence-review.md
    - .aide/prompts/codex-token-mode.md
    - .aide/commands/catalog.yaml
    - AGENTS.md
    - README.md
    - ROADMAP.md
    - PLANS.md
    - IMPLEMENT.md
    - DOCUMENTATION.md
    - docs/reference/**
    - docs/roadmap/**
  forbidden:
    - Git tag creation
    - Git tag push
    - GitHub Release creation
    - GitHub API mutation
    - asset upload
    - package publishing
    - branch mutation
    - active CI installation
    - target repo mutation
    - install apply mode
    - repair apply mode
    - upgrade apply mode
    - rollback apply mode
    - uninstall apply mode
    - provider or model calls
    - network calls
