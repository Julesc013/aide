    - Q36-intent-compiler-prompt-normalization-v0
    - Q37-repo-intelligence-index-v0
    - Q38-file-quality-ledger-v0
    - Q39-refactor-control-plane-v0
    - Q40-root-recycling-framework-v0
    - Q41-existing-tool-absorption-v0
    - Q42-move-map-salvage-map-path-alias-v0
    - Q43-install-plan-model-v0
    - Q44-repair-doctor-model-v0
    - Q45-upgrade-model-v0
    - Q46-rollback-uninstall-model-v0
    - Q47-aide-lite-release-bundle-v0
review_gate:
  final_status: needs_review
  reason: Q48 drafts release materials only; publication requires a later explicit operator-approved phase.
validation:
  required:
    - py -3 .aide/scripts/aide_lite.py release validate
    - py -3 .aide/scripts/aide_lite.py release status
    - py -3 .aide/scripts/aide_lite.py release draft
    - py -3 .aide/scripts/aide_lite.py release draft-validate
    - py -3 .aide/scripts/aide_lite.py release draft-status
    - py -3 .aide/scripts/aide_lite.py release upload-plan
    - py -3 .aide/scripts/aide_lite.py release checklist
    - py -3 .aide/scripts/aide_lite.py release publication-boundary
    - py -3 .aide/scripts/aide_lite.py export-pack --name aide-lite-pack-v0
    - py -3 .aide/scripts/aide_lite.py pack-status
    - py -3 .aide/scripts/aide_lite.py test
  result: pending
  notes:
    - Q48 must use local Q47 bundle artifacts as input.
    - Q48 must not publish, tag, upload, call GitHub APIs, mutate branches, mutate targets, install CI, or call providers/models/network.
