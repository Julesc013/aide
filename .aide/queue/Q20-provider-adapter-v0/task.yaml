acceptance:
  - Q20 queue packet exists and stops at needs_review.
  - Provider adapter policy exists.
  - Provider metadata directory exists with catalog, capability matrix, adapter contract, and status artifacts.
  - Core provider contract code exists and remains no-call.
  - AIDE Lite exposes provider list/status/validate/contract/probe --offline behavior.
  - Provider validation confirms no committed credentials and live calls disabled.
  - Gateway status may reference provider metadata without forwarding.
  - Route decisions may reference provider metadata without execution.
  - Latest Q21 compact task packet is generated.
  - Tests cover provider metadata and no-call boundaries.
  - Evidence and documentation are complete.
