schema_version: aide.queue-task.v0
task_id: Q17-router-profile-v0
title: Router Profile v0
status: running
created_at: 2026-05-06
owner: Codex
purpose: >
  Implement deterministic repo-local advisory routing for compact AIDE work
  units. Q17 defines route classes, hard floors, model/provider metadata,
  route-decision artifacts, and AIDE Lite route list/explain/validate commands
  without provider calls, model calls, network calls, Gateway, Runtime, UI, or
  automatic execution.
dependencies:
  - Q09-token-survival-core
  - Q10-aide-lite-hardening
  - Q11-context-compiler-v0
  - Q12-verifier-v0
  - Q13-evidence-review-workflow
  - Q14-token-ledger-savings-report
  - Q15-golden-tasks-v0
  - Q16-outcome-controller-v0
scope:
  summary: Bounded to advisory routing policy, model/provider metadata, route-decision artifacts, AIDE Lite route commands, tests, generated Q18 packet, docs, and Q17 evidence.
  allowed_paths:
    - .aide/queue/index.yaml
    - .aide/queue/Q17-router-profile-v0/**
    - .aide/scripts/aide_lite.py
    - .aide/scripts/tests/**
    - .aide/models/**
    - .aide/routing/**
    - .aide/policies/routing.yaml
    - .aide/policies/token-budget.yaml
    - .aide/policies/verification.yaml
    - .aide/policies/evals.yaml
    - .aide/policies/controller.yaml
    - .aide/reports/**
    - .aide/controller/**
    - .aide/context/**
    - .aide/prompts/compact-task.md
    - .aide/prompts/evidence-review.md
    - .aide/prompts/codex-token-mode.md
    - .aide/memory/**
    - .aide/commands/catalog.yaml
    - AGENTS.md
    - README.md
    - ROADMAP.md
    - PLANS.md
    - IMPLEMENT.md
    - DOCUMENTATION.md
    - docs/reference/**
    - docs/roadmap/**
    - core/harness/**
    - scripts/aide
  forbidden_paths:
    - .git/**
    - .env
    - secrets/**
    - .aide.local/**
    - raw provider credentials or API keys
    - raw prompt logs unless explicitly disabled by default and not committed
    - provider adapter implementation that calls real providers
    - local model setup or downloads
    - gateway/proxy implementation
    - Runtime/Service/Commander/mobile/host implementation paths except documentation mentions
    - MCP/A2A implementation
    - autonomous loop execution
    - automatic self-modification
    - automatic prompt/policy/route mutation
    - external network calls
    - external provider/model calls
    - live model calls
non_goals:
  - Gateway
  - live model calls
  - provider API calls
  - provider billing integration
  - local model setup
  - OpenAI/Anthropic-compatible API
  - Commander or UI
  - mobile
  - MCP
  - A2A
  - autonomous loop
  - self-mutating prompt optimizer
  - automatic policy rewrite
  - automatic route rewrite
  - semantic cache
  - vector database
  - embeddings
  - exact tokenizer dependency
  - real API usage accounting
  - external benchmarks
  - LLM-as-judge
  - automatic GPT review
  - automatic code repair
  - Q18 cache/local-state boundary
acceptance:
  - Q17 queue packet exists and stops at needs_review.
  - Routing policy exists.
  - Model/provider registry, capability registry, route profiles, hard floors, and fallback policy exist.
  - Route decision schema and latest artifacts exist.
  - AIDE Lite exposes route list, route explain, and route validate behavior.
  - Route explain writes latest-route-decision JSON and Markdown.
  - Hard floors cannot demote.
  - Deterministic tasks can route to no_model_tool.
  - Failed golden/verifier gates affect route decisions.
  - Unknown tasks route conservatively.
  - Provider/model/network calls are not made.
  - Tests cover router behavior.
  - Latest Q18 compact task packet is generated.
result_summary:
  result: pending
  review_gate: required
  latest_route_decision_json: .aide/routing/latest-route-decision.json
  latest_route_decision_md: .aide/routing/latest-route-decision.md
  next_recommended_phase: Q18-cache-and-local-state-boundary
