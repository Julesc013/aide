schema_version: aide.queue-task.v0
id: Q36-intent-compiler-prompt-normalization-v0
title: Intent Compiler and Prompt Normalization v0
status: pending
created_at: 2026-05-14
owner: unassigned
objective: >
  Compile vague, broad, repeated, or incorrect user prompts into bounded,
  repo-grounded WorkUnits before execution.
depends_on:
  - Q35-github-protection-ci-advisory-v0
allowed_paths:
  - .aide/queue/Q36-intent-compiler-prompt-normalization-v0/**
  - .aide/scripts/aide_lite.py
  - .aide/scripts/tests/**
  - .aide/policies/**
  - .aide/context/**
  - .aide/evals/golden-tasks/**
  - docs/reference/**
  - README.md
  - ROADMAP.md
  - PLANS.md
  - IMPLEMENT.md
  - DOCUMENTATION.md
forbidden_paths:
  - .git/**
  - .github/**
  - .aide.local/**
  - secrets/**
  - live provider/model/network calls
  - branch mutation
acceptance:
  - Intent compiler policy exists.
  - Prompt normalization command is report-first.
  - Risk class, task class, dependency, branch, and evidence preflight are deterministic.
  - Tests and golden tasks cover vague/repeated/out-of-order prompt normalization.
non_goals:
  - no autonomous execution
  - no provider/model calls
  - no target repo mutation
