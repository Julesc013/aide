schema_version: aide.queue-task.v0
id: QCHECK-03-ultimate-aide-readiness-sync-audit-plan
title: Ultimate AIDE Readiness, Governance Sync, Target Absorption, Installability, and Next-Plan Audit
kind: checkpoint_audit
status: needs_review
created_at: 2026-05-14
owner: Codex
objective: >
  Perform a report-first checkpoint before Q36 that audits AIDE local readiness,
  Q35 status, Q27-Q35 coherence, portable pack installability, target repo sync
  state, target tool absorption needs, and the exact next queue.
binding_laws:
  - token_usage_must_drop_for_equivalent_quality
  - additive_compatibility_preserving_updates_by_default
  - discover_classify_wrap_map_preserve_migrate_retire_existing_tools
  - compile_raw_intent_into_bounded_repo_grounded_workunits
  - generated_outputs_are_evidence_unless_promoted_by_policy
  - repo_state_and_evidence_outrank_chat_order
allowed_paths:
  - .aide/queue/QCHECK-03-ultimate-aide-readiness-sync-audit-plan/**
  - .aide/queue/index.yaml
  - .aide/context/latest-task-packet.md
  - .aide/context/latest-review-packet.md
  - .aide/changelog/**
  - .aide/git/**
  - .aide/reports/token-ledger.jsonl
  - .aide/reports/token-savings-summary.md
  - .aide/export/aide-lite-pack-v0/**
forbidden_paths:
  - .git/**
  - .github/**
  - .env
  - secrets/**
  - .aide.local/**
  - external target repos
  - live branch mutation
  - release publishing
  - provider_or_model_calls
  - runtime_or_product_implementation
deliverables:
  - audit-report.md
  - aide-state.md
  - governance-readiness.md
  - export-pack-readiness.md
  - eureka-readiness.md
  - dominium-readiness.md
  - existing-tool-absorption.md
  - install-upgrade-rollback-readiness.md
  - intent-repo-quality-plan.md
  - refactor-root-recycling-plan.md
  - target-install-plan.md
  - red-herring-audit.md
  - next-queue.md
  - evidence/commands-run.md
  - evidence/changed-files.md
  - evidence/risks.md
acceptance:
  - AIDE state and Q35 status are explicit.
  - Q27-Q35 readiness is assessed without treating planned work as implemented.
  - Export pack readiness and installability gaps are recorded.
  - Eureka and Dominium are inspected read-only if available.
  - Existing target tools are preserved by an absorption plan, not deletion.
  - Q36-Q57 next queue is precise.
  - No branch, target repo, GitHub, release, provider, or model mutation occurs.
review_gate:
  required: true
  final_status: needs_review
