  - Q15-golden-tasks-v0
  - Q16-outcome-controller-v0
  - Q17-router-profile-v0
  - Q18-cache-local-state-boundary
scope:
  summary: Bounded to Q19 Gateway policy, architecture artifacts, local stdlib skeleton endpoints, AIDE Lite gateway commands, tests, docs, Q20 task packet generation, and Q19 evidence.
  allowed_paths:
    - .aide/queue/index.yaml
    - .aide/queue/Q19-gateway-architecture-skeleton/**
    - .aide/scripts/aide_lite.py
    - .aide/scripts/tests/**
    - .aide/gateway/**
    - .aide/policies/gateway.yaml
    - .aide/policies/cache.yaml
    - .aide/policies/local-state.yaml
    - .aide/policies/routing.yaml
    - .aide/context/**
    - .aide/routing/**
    - .aide/reports/**
