    - .aide/cache/**
    - .aide/prompts/compact-task.md
    - .aide/prompts/evidence-review.md
    - .aide/prompts/codex-token-mode.md
    - .aide/memory/**
    - .aide/commands/catalog.yaml
    - AGENTS.md
    - README.md
    - ROADMAP.md
    - PLANS.md
    - IMPLEMENT.md
    - DOCUMENTATION.md
    - docs/reference/**
    - docs/roadmap/**
    - core/gateway/**
    - core/harness/**
    - scripts/aide
  forbidden_paths:
    - .git/**
    - .env
    - secrets/**
    - .aide.local/**
    - committed real cache blobs
    - raw provider credentials or API keys
    - raw prompt logs
    - raw response logs
    - local machine traces
    - provider adapter implementation that calls real providers
    - local model setup or downloads
    - real Gateway proxy forwarding
    - OpenAI-compatible request forwarding
    - Anthropic-compatible request forwarding
    - provider/model/network calls
    - Runtime/Service/Commander/mobile/host implementation paths except documentation mentions
    - MCP/A2A implementation
    - autonomous loop execution
    - automatic prompt/policy mutation
    - external network calls
    - live model calls
non_goals:
  - live provider calls
  - model calls
  - outbound network calls
  - provider billing integration
  - local model setup
  - OpenAI-compatible proxy forwarding
  - Anthropic-compatible proxy forwarding
  - real /v1/chat/completions
  - real /v1/responses
  - real /anthropic/v1/messages
  - MCP server
  - A2A
  - Commander or UI
  - mobile
  - autonomous loop
  - semantic cache
  - vector database
  - embeddings
  - exact tokenizer dependency
  - real API usage accounting
  - LLM-as-judge
  - automatic GPT review
  - automatic code repair
  - Q20 Provider Adapter v0
acceptance:
  - Q19 queue packet exists and stops at needs_review.
  - Gateway policy exists.
  - Gateway architecture artifacts exist.
  - Core Gateway skeleton exists.
  - Gateway can generate health/status/route/summaries/version responses.
  - AIDE Lite exposes gateway status/endpoints/smoke behavior.
  - Gateway status JSON and Markdown reports are generated.
  - Gateway binds localhost only if serve mode is used.
  - Gateway makes no provider, model, or outbound network calls.
  - Gateway does not implement OpenAI/Anthropic-compatible forwarding.
  - Gateway does not log or store raw prompts or responses.
  - Gateway respects the .aide.local/ boundary.
  - Latest Q20 compact task packet is generated.
  - Tests cover gateway skeleton behavior.
  - Evidence and documentation are complete.
result_summary:
