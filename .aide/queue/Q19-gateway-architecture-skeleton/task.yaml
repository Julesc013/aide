schema_version: aide.queue-task.v0
task_id: Q19-gateway-architecture-skeleton
title: Gateway Architecture and Skeleton
status: running
created_at: 2026-05-06
owner: Codex
purpose: >
  Create the first local AIDE Gateway architecture and skeleton so repo-local
  evidence, policy readiness, summaries, and advisory route decisions can be
  exposed through safe health/status/route endpoints without provider calls,
  model calls, outbound network calls, raw prompt logging, raw response logging,
  Runtime, UI, or real proxy forwarding.
