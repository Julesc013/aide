schema_version: aide.queue-task.v0
id: Q28-git-workflow-policy-v0
title: Git Workflow Policy v0
kind: governance
status: running
planning_state: implementation
owner: Codex
created_at: 2026-05-13
depends_on:
  - Q27-commit-discipline-workunit-recovery-v0
objective: >
  Implement canonical AIDE policy and report-only tooling for branch roles,
  workflow detection, sync rules, pruning policy, project-specific workflow
  profiles, and future merge/promotion helper inputs.
allowed_paths:
  - .aide/queue/index.yaml
  - .aide/queue/Q28-git-workflow-policy-v0/**
  - .aide/scripts/aide_lite.py
  - .aide/scripts/tests/**
  - .aide/git/**
  - .aide/policies/git-workflow.yaml
  - .aide/policies/branch-roles.yaml
  - .aide/policies/promotion-rules.yaml
  - .aide/policies/sync-policy.yaml
  - .aide/policies/prune-policy.yaml
  - .aide/policies/task-resumption.yaml
  - .aide/policies/work-units.yaml
  - .aide/policies/commit-messages.yaml
  - .aide/evals/golden-tasks/**
  - .aide/evals/golden-tasks/catalog.yaml
  - .aide/export/aide-lite-pack-v0/**
  - .aide/context/latest-task-packet.md
  - .aide/context/latest-review-packet.md
  - .aide/prompts/compact-task.md
  - .aide/prompts/evidence-review.md
  - .aide/prompts/codex-token-mode.md
  - .aide/commands/catalog.yaml
  - AGENTS.md
  - README.md
  - ROADMAP.md
  - PLANS.md
  - IMPLEMENT.md
  - DOCUMENTATION.md
  - docs/reference/**
  - docs/roadmap/**
forbidden_paths:
  - .git/** writes
  - .env
  - secrets/**
  - .aide.local/**
  - raw provider credentials or API keys
  - raw prompt logs
  - raw response logs
  - real Eureka repo mutation
  - real Dominium repo mutation
  - external repo mutation
  - branch creation
  - branch deletion
  - branch merge
  - branch push
  - remote push
  - GitHub API mutation
  - GitHub branch protection mutation
  - product runtime changes
  - provider/model/network calls
redo_reason: >
  Reopened after Q27 implemented structured commit discipline, changelog
  preview, WorkUnit recovery, and task recovery command surfaces. Previous
  blocker evidence remains retained as history but is superseded by this
  implementation pass.
acceptance:
  - q28_queue_packet_exists
  - q28_status_needs_review_after_implementation
  - git_workflow_policy_exists
  - branch_roles_policy_exists
  - promotion_rules_policy_exists
  - sync_policy_exists
  - prune_policy_exists
  - project_profiles_exist
  - git_workflow_detection_artifacts_exist
  - aide_lite_git_workflow_commands_exist
  - current_branch_role_can_be_detected
  - main_canonical_and_dev_integration
  - detection_commands_report_only
  - golden_tasks_cover_branch_roles_and_policy
  - export_pack_includes_git_workflow_policy
  - pack_status_passes
  - evidence_complete
review_gate:
  required: true
  stop_at: needs_review
notes: >
  Q28 is being implemented as a report-only Git workflow policy phase. It must
  not create, delete, merge, push, prune, fetch, or mutate remote branches.
