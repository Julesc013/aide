schema_version: aide.evals-catalog.v0
profile_contract_version: aide.profile-contract.v0
catalog_status: partial
source_of_truth_note: This catalog declares minimal self-hosting eval intent. It does not replace bootstrap-era eval records under `evals/**`.
evals:
  - id: documentation-sanity
    purpose: Check required docs and terminology anchors exist.
    status: manual-structural
    owner_component: docs
    future_harness: planned
  - id: queue-integrity
    purpose: Check queue index, task packets, statuses, prompts, and evidence paths are internally consistent.
    status: script-assisted
    owner_component: queue
    current_commands:
      - py -3 scripts/aide-queue-status
      - py -3 scripts/aide-queue-next
    future_harness: planned
  - id: profile-completeness
    purpose: Check required Profile/Contract v0 files and fields exist.
    status: manual-structural
    owner_component: core-contract
    future_harness: planned
  - id: future-harness-smoke
    purpose: Future smoke check for Harness v0 import, compile, validate, doctor, migrate, and bakeoff command declarations.
    status: planned
    owner_component: core-harness
    future_harness: Q04-harness-v0
  - id: future-compatibility-smoke
    purpose: Structural smoke check for schema version, migration baseline, replay corpus, upgrade gates, and compatibility posture.
    status: implemented-structural-v0
    owner_component: core-compat
    current_commands:
      - py -3 scripts/aide validate
      - py -3 scripts/aide migrate
    future_harness: compatibility hardening remains later
  - id: dominium-bridge-structural
    purpose: Structural smoke check for Q07 Dominium Bridge files, XStack boundary anchors, strict policy overlays, generated target metadata, and compatibility pinning.
    status: implemented-structural-v0
    owner_component: bridges-dominium
    current_commands:
      - py -3 scripts/aide validate
      - py -3 scripts/aide compile --dry-run
    future_harness: stronger bridge validation remains later
  - id: q15-golden-tasks-v0
    purpose: Deterministic repo-local quality gates for AIDE token-survival workflow artifacts.
    status: implemented-pending-review
    owner_component: token-survival
    current_commands:
      - py -3 .aide/scripts/aide_lite.py eval list
      - py -3 .aide/scripts/aide_lite.py eval run
      - py -3 .aide/scripts/aide_lite.py eval report
    future_harness: Q16 may consume results as outcome-controller signals
notes:
  - Q03 does not add executable eval runners.
  - Existing eval run records remain under `evals/**`.
  - Q06 compatibility replay is structural Harness summary replay, not Runtime replay.
  - Q07 Dominium Bridge validation is structural and AIDE-side only; it does not execute Dominium proofs.
