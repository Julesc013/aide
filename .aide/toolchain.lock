schema_version: aide.toolchain-lock.v0
profile_contract_version: aide.profile-contract.v0
profile_schema_version: aide.profile.v0
queue_index_schema_version: aide.queue-index.v0
queue_policy_version: aide.queue-policy.v0

contract_tooling:
  status: documented-shapes-only
  schema_strategy: YAML records with Markdown documented shapes
  standard_library_validation_feasible: partial
  external_dependencies: none

harness:
  status: implemented-v0
  owner_queue_item: Q04-harness-v0
  executable_harness_commands: implemented
  entrypoint: scripts/aide
  implemented_commands:
    - init
    - import
    - compile
    - validate
    - doctor
    - migrate
    - bakeoff
    - self-check
  implemented_queue_helper_scripts:
    - scripts/aide-queue-status
    - scripts/aide-queue-next
    - scripts/aide-queue-run
  queue_helpers_are_harness_v0: false

generated_artifacts:
  status: implemented-pending-review
  owner_queue_item: Q05-generated-artifacts-v0
  downstream_artifacts_are_canonical: false
  drift_acceptance: review_required
  manifest: .aide/generated/manifest.yaml
  final_claude_targets: deferred
  preview_targets:
    - .aide/generated/preview/CLAUDE.md

compatibility:
  status: implemented-v0-pending-review
  owner_queue_item: Q06-compatibility-baseline
  baseline_version: aide.compat-baseline.v0
  version_registry: .aide/compat/schema-versions.yaml
  migration_registry: .aide/compat/migration-baseline.yaml
  replay_corpus: .aide/compat/replay-corpus.yaml
  upgrade_gates: .aide/compat/upgrade-gates.yaml
  deprecations: .aide/compat/deprecations.yaml
  migration_engine: no-op-current-baseline
  mutating_migrations: none

package_or_install_automation:
  package_manager: none
  installer: none
  release_automation: none
  signing: none

limitations:
  - This lockfile records the Contract/Profile v0 shape only.
  - It does not claim full package, worker, model, runtime, service, compatibility migration, bridge implementation, gateway, provider, or toolchain automation.
  - Queue helper scripts are conservative readers and must not be treated as Runtime.
  - Generated artifacts v0 are managed or preview outputs and are not canonical source-of-truth records.
  - Compatibility v0 records known version posture and no-op migration status only.
