schema_version: 1
kind: aide.inventory.ide-families
ide_families:
  - id: microsoft.visual-studio
    vendor: microsoft
    product: visual-studio
    display_name: Microsoft Visual Studio
    description: Windows-hosted IDE family record for Microsoft Visual Studio lanes.
    expected_posture: mixed-over-time
    notes: Research confirms legacy native, VSIX, VSSDK, and newer VisualStudio.Extensibility breakpoints; exact version mapping lives in version inventory and matrices.
  - id: microsoft.visual-studio-mac
    vendor: microsoft
    product: visual-studio-mac
    display_name: Microsoft Visual Studio for Mac
    description: Retired macOS-hosted IDE family record for Visual Studio for Mac lanes.
    expected_posture: archival
    notes: Native extensibility is treated as MonoDevelop-derived legacy-native behavior; companion work remains an AIDE fallback abstraction.
  - id: apple.xcode
    vendor: apple
    product: xcode
    display_name: Apple Xcode
    description: macOS-hosted IDE family record for Apple Xcode lanes.
    expected_posture: mixed-over-time
    notes: Research distinguishes a narrow native XcodeKit source-editor lane from the broader AIDE companion fallback; exact version mapping lives in version inventory and matrices.
  - id: metrowerks.codewarrior
    vendor: metrowerks
    product: codewarrior
    display_name: Metrowerks CodeWarrior
    description: Historical CodeWarrior host-family record spanning preserved classic IDE and later Eclipse-based lanes.
    expected_posture: mixed-over-time
    notes: The classic IDE SDK mapping is exact for preserved native manuals, while later Eclipse-era CodeWarrior releases remain under a conservative AIDE umbrella until deeper lane normalization occurs.
