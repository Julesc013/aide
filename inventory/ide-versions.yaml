schema_version: 1
kind: aide.inventory.ide-versions
record_shape:
  id: stable exact-version record id
  family: inventory ide-family id
  product: inventory product id
  vendor: inventory vendor id
  display_name: human-readable version label
  upstream_version: exact upstream version string or null
  release_line: release line identifier or deferred
  host_os_families: list of inventory os-family ids
  release_date: ISO-8601 date string or null
  end_of_support: ISO-8601 date string or null
  vendor_lifecycle_state: supported|out-of-support|retired|unverified
  primary_adapter_lane: inventory adapter-technology id or null
  research_status: researched|unverified|deferred|placeholder
  notes: short factual note
