schema_version: 1
kind: aide.inventory.adapter-technologies
adapter_technologies:
  - id: com-addin
    display_name: COM Add-in
    description: Legacy native Windows Visual Studio lane used as AIDE's umbrella for pre-VSIX extensibility work.
    intended_host_family_scope:
      - microsoft.visual-studio
    support_mode_bias: legacy-native
    notes: This is an AIDE umbrella lane, not a claim that every pre-2010 Microsoft contract shared one exact label.
  - id: vsix-v1
    display_name: VSIX v1
    description: Visual Studio 2010-era VSIX packaging and integration lane.
    intended_host_family_scope:
      - microsoft.visual-studio
    support_mode_bias: legacy-native
    notes: Research ties this lane to the first documented VSIX project and packaging workflow in Visual Studio 2010.
  - id: vsix-v2-vssdk
    display_name: VSIX v2 with VSSDK
    description: Visual Studio 2012-and-later VSIX 2.0 and VSSDK lane for native in-host extensions.
    intended_host_family_scope:
      - microsoft.visual-studio
    support_mode_bias: native
    notes: Research ties VSIX schema 2.0 to Visual Studio 2012 and keeps this as the main native lane through most supported Windows releases.
  - id: extensibility
    display_name: Extensibility
    description: Modern VisualStudio.Extensibility SDK lane for current Windows Visual Studio contracts.
    intended_host_family_scope:
      - microsoft.visual-studio
    support_mode_bias: native
    notes: This lane is not treated as a full replacement for VSSDK in this prompt; coexistence remains explicit.
  - id: monodevelop-addin
    display_name: MonoDevelop Add-in
    description: Visual Studio for Mac add-in lane based on the product's Xamarin Studio and MonoDevelop lineage.
    intended_host_family_scope:
      - microsoft.visual-studio-mac
    support_mode_bias: legacy-native
    notes: This lane is archival-oriented because the host family is retired, but it still refers to a native in-host extension surface.
  - id: xcodekit
    display_name: XcodeKit
    description: Native Xcode extension lane based on XcodeKit contracts.
    intended_host_family_scope:
      - apple.xcode
    support_mode_bias: native
    notes: Intended as a compatibility-technology record, not a version claim.
  - id: ide-sdk
    display_name: IDE SDK
    description: Historical IDE SDK lane for CodeWarrior-family integration.
    intended_host_family_scope:
      - metrowerks.codewarrior
    support_mode_bias: legacy-native
    notes: Lane posture may be archival even when the technology itself is host-native.
  - id: companion
    display_name: Companion
    description: Out-of-process companion lane used when native surfaces are limited or deferred.
    intended_host_family_scope:
      - microsoft.visual-studio-mac
      - apple.xcode
      - metrowerks.codewarrior
    support_mode_bias: companion
    notes: Companion is an AIDE architectural lane, not a vendor product label or a promise of cross-platform parity.
