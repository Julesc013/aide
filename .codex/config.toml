#:schema https://developers.openai.com/codex/config-schema.json
# AIDE repo-local Codex defaults.
# These settings favor auditable, approval-gated work in a version-controlled engineering repository.
# Keep this file path-neutral: no Windows, Linux, macOS, WSL, or user-specific absolute paths.

model = "gpt-5.5"
model_provider = "openai"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "high"

[features]
# Current Codex subagent support is controlled by multi_agent.
# Do not use older/non-schema keys such as plan_mode, repo_local_skills,
# custom_agents, or task_packets here.
multi_agent = true

[agents]
# Bounded delegation. Codex spawns subagents only when explicitly requested.
max_threads = 2
max_depth = 1
job_max_runtime_seconds = 1800

[sandbox_workspace_write]
# Network stays off by default in workspace-write mode.
network_access = false