schema_version: 1
kind: aide.matrices.platform-reach
rows:
  - family: microsoft.visual-studio
    technology: com-addin
    host_os_families:
      - windows
    potential_target_os_families:
      - windows
    reach_posture: native
    notes: Windows-hosted legacy native lane only; downstream app-target reach is intentionally not modeled here.
  - family: microsoft.visual-studio
    technology: vsix-v1
    host_os_families:
      - windows
    potential_target_os_families:
      - windows
    reach_posture: native
    notes: Windows-hosted Visual Studio 2010-era lane; no non-Windows host reach is claimed.
  - family: microsoft.visual-studio
    technology: vsix-v2-vssdk
    host_os_families:
      - windows
    potential_target_os_families:
      - windows
    reach_posture: native
    notes: Windows-hosted native lane for Visual Studio 2012 through the supported VSIX/VSSDK family.
  - family: microsoft.visual-studio
    technology: extensibility
    host_os_families:
      - windows
    potential_target_os_families:
      - windows
    reach_posture: native
    notes: Windows-hosted modern lane for current Visual Studio releases; platform reach is modeled only at the host OS-family level.
  - family: microsoft.visual-studio-mac
    technology: monodevelop-addin
    host_os_families:
      - macos
    potential_target_os_families:
      - macos
    reach_posture: native
    notes: macOS-hosted archival native lane for a retired product family; downstream workload targets are out of scope here.
  - family: microsoft.visual-studio-mac
    technology: companion
    host_os_families:
      - macos
    potential_target_os_families:
      - macos
    reach_posture: companion
    notes: macOS-hosted archival companion fallback only; broader cross-OS companion reach remains deferred.
  - family: apple.xcode
    technology: xcodekit
    host_os_families:
      - macos
    potential_target_os_families:
      - ios
      - ipados
      - macos
      - tvos
      - watchos
      - visionos
    reach_posture: native
    notes: Xcode is macOS-hosted; target-platform reach is recorded at the Apple-platform family level only and does not imply that the extension itself runs on those target OS families.
  - family: apple.xcode
    technology: companion
    host_os_families:
      - macos
    potential_target_os_families:
      - ios
      - ipados
      - macos
      - tvos
      - watchos
      - visionos
    reach_posture: companion
    notes: Companion uses the same high-level Apple target-family envelope, but remains an out-of-process AIDE abstraction rather than a native Xcode plug-in contract.
  - family: metrowerks.codewarrior
    technology: ide-sdk
    host_os_families: []
    potential_target_os_families: []
    reach_posture: deferred
    notes: Historical platform reach remains unresolved and unverified in this seed matrix.
  - family: metrowerks.codewarrior
    technology: companion
    host_os_families: []
    potential_target_os_families: []
    reach_posture: deferred
    notes: Companion reach is intentionally deferred until later research defines a credible target.
