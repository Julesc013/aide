schema_version: 1
kind: aide.matrices.support
rows:
  - family: microsoft.visual-studio
    technology: com-addin
    support_mode: legacy-native
    target_tier: T2
    current_state: booting
    boot_slice_posture: degraded-runnable
    notes: Runnable cli-bridge boot-slice proof exists for the oldest legacy umbrella lane. Native COM add-in loading remains blocked by missing legacy environments and unresolved pre-2010 contract detail.
  - family: microsoft.visual-studio
    technology: vsix-v1
    support_mode: legacy-native
    target_tier: T2
    current_state: booting
    boot_slice_posture: degraded-runnable
    notes: Runnable cli-bridge boot-slice proof exists for the Visual Studio 2010 VSIX breakpoint. Native VSIX packaging and richer editor wiring remain deferred to a real VS2010 environment.
  - family: microsoft.visual-studio
    technology: vsix-v2-vssdk
    support_mode: native
    target_tier: T3
    current_state: booting
    boot_slice_posture: blocked-structural
    notes: Structural blocked proof exists for the Windows native reference lane. The required embedded L2 editor proof is not honest to claim without a VSSDK-capable Visual Studio environment.
  - family: microsoft.visual-studio
    technology: extensibility
    support_mode: native
    target_tier: T3
    current_state: booting
    boot_slice_posture: degraded-runnable
    notes: Runnable cli-bridge boot-slice proof exists for the modern Windows lane. The documented out-of-process or local-service shape remains deferred until a real host environment is wired.
  - family: microsoft.visual-studio-mac
    technology: monodevelop-addin
    support_mode: legacy-native
    target_tier: T1
    current_state: booting
    boot_slice_posture: blocked-structural
    notes: Structural blocked archival-native proof exists for the MonoDevelop-derived lane. Runtime verification remains blocked by the retired host and missing reproducible macOS archival environment.
  - family: microsoft.visual-studio-mac
    technology: companion
    support_mode: companion
    target_tier: T2
    current_state: booting
    boot_slice_posture: runnable-fallback
    notes: Runnable cli-bridge companion proof exists and reports the native Mac lane as blocked. This is the first executable Microsoft archival fallback lane.
  - family: apple.xcode
    technology: xcodekit
    support_mode: native
    target_tier: T2
    current_state: researched
    notes: Apple documents XcodeKit source editor extensions as the public native in-host lane, but the surface is intentionally narrow and AIDE has not implemented it.
  - family: apple.xcode
    technology: companion
    support_mode: companion
    target_tier: T2
    current_state: researched
    notes: Companion remains an AIDE fallback abstraction for pre-XcodeKit families or broader workflows that exceed the documented native source-editor surface.
  - family: metrowerks.codewarrior
    technology: ide-sdk
    support_mode: legacy-native
    target_tier: T1
    current_state: researched
    notes: Preserved classic CodeWarrior manuals verify a native SDK and COM automation surface; later Eclipse-based CodeWarrior releases remain under this lane only as a conservative umbrella.
  - family: metrowerks.codewarrior
    technology: companion
    support_mode: companion
    target_tier: T1
    current_state: researched
    notes: Companion remains the archival out-of-process fallback for CodeWarrior eras whose native contract is missing, limited, or still unresolved.
