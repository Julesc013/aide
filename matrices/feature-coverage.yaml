schema_version: 1
kind: aide.matrices.feature-coverage
feature_buckets:
  - id: load-identify
    description: Load the lane and identify host or version context.
    minimum_capability: L0
  - id: command-entry
    description: Register or expose a command or entry point.
    minimum_capability: L1
  - id: editor-transform
    description: Perform editor or file-oriented interaction.
    minimum_capability: L2
  - id: project-awareness
    description: Observe or use project or workspace context.
    minimum_capability: L3
  - id: deep-ide-ui
    description: Integrate with deeper IDE UI or workflow surfaces.
    minimum_capability: L4
  - id: companion-workflow
    description: Use an out-of-process workflow to assist the host.
    minimum_capability: L1
boot_slice_profile:
  id: boot-slice-01
  title: Identify, invoke, report, and mark
  required_buckets:
    - load-identify
    - command-entry
  conditional_buckets:
    - editor-transform
    - companion-workflow
  deferred_buckets:
    - project-awareness
    - deep-ide-ui
coverage_state_legend:
  required: Bucket is part of the minimum accepted boot-slice proof for this lane.
  optional: Bucket is allowed as a richer proof but is not required for first-wave lane completion.
  fallback: Bucket is satisfied by fallback behavior rather than the bucket's native in-host form.
  deferred: Bucket is intentionally deferred or requires later research.
  unavailable: Bucket is not part of the first boot-slice proof for this lane.
implementation_state_legend:
  implemented: Bucket is backed by runnable proof in the current repository state.
  degraded: Bucket is backed by an accepted degraded proof rather than a native in-host result.
  blocked: Bucket is meaningful but a concrete blocker prevents honest proof in the current environment.
  deferred: Bucket is intentionally postponed after the first proof.
  not-applicable: Bucket is not meaningful for the lane's current proof shape.
