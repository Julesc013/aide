schema_version: 1
kind: aide.matrices.capability
rows:
  - family: microsoft.visual-studio
    technology: com-addin
    current_capability: null
    target_capability: L2
    notes: Current capability is unimplemented; target ceiling is kept modest for the legacy umbrella lane.
  - family: microsoft.visual-studio
    technology: vsix-v1
    current_capability: null
    target_capability: L3
    notes: Visual Studio 2010 VSIX is treated as capable of meaningful native workflows, but AIDE has not implemented any of them.
  - family: microsoft.visual-studio
    technology: vsix-v2-vssdk
    current_capability: null
    target_capability: L4
    notes: VSSDK remains the deepest researched Windows Visual Studio lane in this repository, but the current capability is still null.
  - family: microsoft.visual-studio
    technology: extensibility
    current_capability: null
    target_capability: L3
    notes: Modern VisualStudio.Extensibility has documented project-query, LSP, debugger visualizer, and hot-load workflows, but full parity with VSSDK is not assumed.
  - family: microsoft.visual-studio-mac
    technology: monodevelop-addin
    current_capability: null
    target_capability: L3
    notes: MonoDevelop-derived add-ins are capable of more than command-only workflows, but the lane is archival and still unimplemented in AIDE.
  - family: microsoft.visual-studio-mac
    technology: companion
    current_capability: null
    target_capability: L2
    notes: Companion is intentionally shallower than a native lane and is kept conservative for archival or adjacent workflows.
  - family: apple.xcode
    technology: xcodekit
    current_capability: null
    target_capability: L2
    notes: Apple's documented source-editor surface supports command entry and editor-buffer interaction, but no deep project-model or debugger integration is claimed here.
  - family: apple.xcode
    technology: companion
    current_capability: null
    target_capability: L3
    notes: Companion is kept as the broader fallback lane for project-aware workflows outside the public XcodeKit surface, but AIDE still has no implementation.
  - family: metrowerks.codewarrior
    technology: ide-sdk
    current_capability: null
    target_capability: L3
    notes: Preserved SDK and automation manuals show project-aware native integration surfaces, but AIDE still has no implementation and does not claim a proven deep-UI ceiling.
  - family: metrowerks.codewarrior
    technology: companion
    current_capability: null
    target_capability: L2
    notes: Companion is intentionally shallower than the native lane and is kept at an editor and workflow-aware ceiling for archival use.
