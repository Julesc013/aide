schema_version: 1
kind: aide.matrices.test
verification_categories:
  - id: existence
    description: Verify that required files, manifests, directories, or records exist.
  - id: schema
    description: Verify that machine-readable records follow their intended structural shape.
  - id: docs-consistency
    description: Verify that docs, matrices, manifests, and catalogs do not contradict one another.
  - id: load-smoke
    description: Verify that a lane can load or invoke its first entry point and return deterministic report output or structured unavailability.
  - id: editor-smoke
    description: Verify a deterministic editor or file interaction such as the boot-slice marker transform or a stable edit preview.
  - id: workspace-smoke
    description: Verify basic project or workspace awareness.
  - id: packaging-check
    description: Verify packaging posture, artifact shape, or manifest completeness.
  - id: release-shape
    description: Verify release records, release channels, or release-note alignment.
  - id: archival-record
    description: Verify archival evidence, provenance records, blocked-lane records, or preservation-oriented outputs.
boot_slice_verification_profile:
  id: boot-slice-01
  required_for_all:
    - existence
    - schema
    - docs-consistency
    - load-smoke
  conditional_rules:
    editor-smoke: Required only for lanes whose acceptance target includes an L2 marker proof.
    archival-record: Required for archival and fallback lanes whose proof depends on preserved environments or explicit blocker records.
  deferred_for_boot_slice:
    - workspace-smoke
    - packaging-check
    - release-shape
check_status_legend:
  planned: The category should be covered when the scoped work becomes meaningful.
  deferred: The category exists but is intentionally postponed to a later phase.
  blocked: The category cannot be meaningfully executed because a concrete blocker exists.
  not-applicable: The category does not meaningfully apply to the scoped lane.
  unverifiable: The category is meaningful but cannot currently be verified honestly.
